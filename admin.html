<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrácia | Tomi Štúdio</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="fonts/fontawesome/css/font-awesome.min.css">
  
  <style>
    body { 
      background: #111; 
      color: #fff; 
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      padding: 20px;
    }

    .login-card { 
      background: #1a1a1a; 
      padding: 40px 30px; 
      border-radius: 12px; 
      width: 100%; 
      max-width: 420px; 
      box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .login-card h3 {
      font-weight: 700;
      color: #ffb800;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .form-input { 
      background: #111; 
      border: 1px solid rgba(255,255,255,0.1); 
      color: white; 
      width: 100%; 
      padding: 12px 15px; 
      margin-bottom: 20px; 
      border-radius: 6px;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: #ffb800;
      box-shadow: 0 0 8px rgba(255, 184, 0, 0.4);
    }

    .button-primary { 
      width: 100%; 
      background: #ffb800; 
      color: black; 
      border: none; 
      padding: 12px; 
      border-radius: 6px; 
      font-size: 0.95rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      transition: 0.3s;
      cursor: pointer;
    }

    .button-primary:hover {
      background: #cca300;
    }

    .button-primary:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
    }

    .error-msg { 
      color: #ff6b6b; 
      font-size: 0.9rem; 
      margin-top: 15px; 
      display: none; 
    }

    /* Admin Dashboard Area */
    .admin-dashboard {
      display: none;
      padding: 40px 0;
    }

    .dashboard-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }

    .dashboard-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .dashboard-card h4 {
      font-weight: 700;
      color: #ffb800;
      margin-bottom: 20px;
    }

    .announcement-item {
      background: #111;
      border-left: 4px solid #ffb800;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 15px;
      border-top: 1px solid rgba(255,255,255,0.02);
      border-right: 1px solid rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    .announcement-date {
      color: #ffb800;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .announcement-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .announcement-content {
      color: #ccc;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-delete:hover {
      background: #c82333;
    }

    .btn-logout {
      background: transparent;
      color: #ffb800;
      border: 1px solid #ffb800;
      padding: 6px 15px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-logout:hover {
      background: #ffb800;
      color: black;
    }

    .btn-secondary-custom {
      background: transparent;
      color: #aaa;
      border: 1px solid #555;
      padding: 8px 20px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-right: 10px;
    }

    .btn-secondary-custom:hover {
      border-color: #aaa;
      color: white;
    }
  </style>
</head>
<body>

  <!-- LOGIN CONTAINER -->
  <div id="login-section" class="login-container">
    <div class="login-card text-center">
      <h3>Prihlásenie</h3>
      <form id="login-form">
        <input type="email" id="email" class="form-input" placeholder="E-mailová adresa" required>
        <input type="password" id="password" class="form-input" placeholder="Heslo" required>
        <button type="submit" class="button-primary" id="login-btn">Prihlásiť sa</button>
        <div id="error-msg" class="error-msg text-center"></div>
      </form>
      <div class="mt-4">
        <a href="index.html" class="text-muted" style="font-size: 0.85rem; text-decoration: none;"><span class="fa fa-arrow-left mr-2"></span>Návrat na web</a>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="admin-section" class="admin-dashboard">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="dashboard-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0 text-white font-weight-bold">Administrácia Oznamov</h2>
            <button id="logout-btn" class="btn-logout">Odhlásiť sa</button>
          </div>
        </div>
      </div>
      
      <div class="row">
        <!-- ADD ANNOUNCEMENT FORM -->
        <div class="col-lg-5 mb-4">
          <div class="dashboard-card">
            <h4>Nový oznam</h4>
            <form id="announcement-form">
              <div class="form-group mb-3">
                <label class="text-muted mb-1" style="font-size: 0.8rem; font-weight: bold; letter-spacing: 0.5px;">NADPIS OZNAMU</label>
                <input type="text" id="ann-title" class="form-input mb-0" placeholder="Napr. Zmena otváracích hodín" required>
              </div>
              <div class="form-group mb-4">
                <label class="text-muted mb-1" style="font-size: 0.8rem; font-weight: bold; letter-spacing: 0.5px;">OBSAH OZNAMU</label>
                <textarea id="ann-content" class="form-input mb-0" placeholder="Sem napíšte podrobnosti oznamu..." rows="5" required style="min-height: 120px;"></textarea>
              </div>
              <button type="submit" class="button-primary" id="save-btn">Zverejniť oznam</button>
            </form>
            <div id="save-status" class="mt-3 text-center font-weight-bold" style="font-size: 0.9rem;"></div>
          </div>
        </div>
        
        <!-- ANNOUNCEMENTS LIST -->
        <div class="col-lg-7">
          <div class="dashboard-card">
            <h4>Aktívne oznamy</h4>
            <div id="announcements-list">
              <!-- Loading Spinner -->
              <div class="text-center py-4" id="list-loading">
                <span class="fa fa-spinner fa-spin fa-2x text-warning"></span>
                <p class="text-muted mt-2">Načítavam oznamy...</p>
              </div>
              <!-- List items will render here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts modules -->
  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const loginSection = document.getElementById('login-section');
    const adminSection = document.getElementById('admin-section');
    
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    
    const announcementForm = document.getElementById('announcement-form');
    const saveBtn = document.getElementById('save-btn');
    const saveStatus = document.getElementById('save-status');
    const announcementsList = document.getElementById('announcements-list');
    
    const logoutBtn = document.getElementById('logout-btn');

    // 1. Authentication State monitoring
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User logged in -> show Dashboard
        loginSection.style.display = 'none';
        adminSection.style.display = 'block';
        loadAnnouncements();
      } else {
        // User logged out -> show Login Card
        loginSection.style.display = 'flex';
        adminSection.style.display = 'none';
      }
    });

    // 2. Handle Login Submit
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      loginBtn.disabled = true;
      loginBtn.innerText = 'Prihlasujem...';
      errorMsg.style.display = 'none';
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        console.error(err);
        errorMsg.innerText = 'Nesprávny email alebo heslo.';
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.innerText = 'Prihlásiť sa';
      }
    });

    // 3. Handle Logout Click
    logoutBtn.addEventListener('click', async () => {
      if (confirm('Naozaj sa chcete odhlásiť?')) {
        await signOut(auth);
      }
    });

    // 4. Load announcements from Firestore
    async function loadAnnouncements() {
      announcementsList.innerHTML = `
        <div class="text-center py-4">
          <span class="fa fa-spinner fa-spin fa-2x text-warning"></span>
          <p class="text-muted mt-2">Načítavam oznamy...</p>
        </div>
      `;
      
      try {
        const q = query(collection(db, "announcements"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        announcementsList.innerHTML = '';
        
        if (querySnapshot.empty) {
          announcementsList.innerHTML = '<p class="text-muted text-center py-4">Zatiaľ nie sú pridané žiadne oznamy.</p>';
          return;
        }
        
        querySnapshot.forEach((docSnap) => {
          const item = docSnap.data();
          const id = docSnap.id;
          
          const card = document.createElement('div');
          card.className = 'announcement-item d-flex justify-content-between align-items-start';
          card.innerHTML = `
            <div style="flex-grow: 1; padding-right: 15px;">
              <div class="announcement-date">${item.date}</div>
              <h5 class="announcement-title">${item.title}</h5>
              <div class="announcement-content">${item.content.replace(/\n/g, '<br>')}</div>
            </div>
            <button class="btn-delete" data-id="${id}">Zmazať</button>
          `;
          
          announcementsList.appendChild(card);
        });
        
        // Bind delete events
        document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if (confirm('Naozaj chcete vymazať tento oznam?')) {
              const id = e.target.getAttribute('data-id');
              e.target.disabled = true;
              e.target.innerText = 'Mažem...';
              
              try {
                await deleteDoc(doc(db, "announcements", id));
                loadAnnouncements();
              } catch (err) {
                console.error(err);
                alert('Chyba pri mazaní oznamu.');
                e.target.disabled = false;
                e.target.innerText = 'Zmazať';
              }
            }
          });
        });
        
      } catch (err) {
        console.error(err);
        announcementsList.innerHTML = '<p class="text-danger text-center py-4">Nepodarilo sa načítať oznamy.</p>';
      }
    }

    // 5. Handle Announcement Submit
    announcementForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('ann-title').value;
      const content = document.getElementById('ann-content').value;
      
      saveBtn.disabled = true;
      saveBtn.innerText = 'Zverejňujem...';
      saveStatus.innerText = '';
      
      try {
        const today = new Date().toLocaleDateString("sk-SK");
        await addDoc(collection(db, "announcements"), {
          title: title,
          content: content,
          date: today,
          createdAt: new Date()
        });
        
        saveStatus.style.color = '#28a745';
        saveStatus.innerText = 'Oznam bol úspešne zverejnený!';
        announcementForm.reset();
        loadAnnouncements();
        
        setTimeout(() => {
          saveStatus.innerText = '';
        }, 3000);
        
      } catch (err) {
        console.error(err);
        saveStatus.style.color = '#ff6b6b';
        saveStatus.innerText = 'Chyba: Nepodarilo sa uložiť oznam.';
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = 'Zverejniť oznam';
      }
    });

  </script>
</body>
</html>
