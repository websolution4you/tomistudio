<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 50" width="100%" height="100%">
  <!-- Comb silhouette -->
  <!-- Spine of the comb -->
  <path d="M5,12 h55 a3,3 0 0 1 3,3 v8 a3,3 0 0 1 -3,3 h-55 a3,3 0 0 1 -3,-3 v-8 a3,3 0 0 1 3,-3 z" fill="#ffb800" />
  <!-- Teeth of the comb -->
  <path d="M7,26 v5 M12,26 v5 M17,26 v5 M22,26 v5 M27,26 v5 M32,26 v5 M37,26 v5 M42,26 v5 M47,26 v5 M52,26 v5 M57,26 v5" stroke="#ffb800" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Text inside the comb spine -->
  <text x="32" y="23" font-family="'Arial Black', 'Impact', 'Trebuchet MS', sans-serif" font-weight="900" font-size="11" fill="#000" text-anchor="middle" letter-spacing="1">TOMI</text>
  
  <!-- Subtext below the comb -->
  <text x="32" y="42" font-family="'Roboto', 'Helvetica', 'Arial', sans-serif" font-weight="700" font-size="5.5" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">PÁNSKE KADERNICTVO</text>
  
  <!-- Scissors on the right -->
  <g transform="translate(-10, 0)">
    <!-- Left finger loop -->
    <circle cx="95" cy="38" r="4.5" fill="none" stroke="#ffb800" stroke-width="2" />
    <!-- Left blade/handle -->
    <path d="M96,34.5 L106,12" stroke="#ffb800" stroke-width="2" stroke-linecap="round" />
    
    <!-- Right finger loop -->
    <circle cx="107" cy="38" r="4.5" fill="none" stroke="#ffb800" stroke-width="2" />
    <!-- Right blade/handle -->
    <path d="M106,34.5 L96,12" stroke="#ffb800" stroke-width="2" stroke-linecap="round" />
    
    <!-- Pivot screw -->
    <circle cx="101" cy="24" r="1.5" fill="#000" stroke="#ffb800" stroke-width="1" />
  </g>
</svg>
